name: LLVM Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up MSVC environment
      uses: ilammy/msvc-dev-cmd@v1

    - name: Add LLVM to PATH
      run: echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Verify compiler
      run: clang --version

    - name: Update Contributors File
      shell: bash
      run: |
        git fetch origin main
        git checkout main
        git pull origin main

        echo "# Contributors" > CONTRIBUTORS.md
        echo "" >> CONTRIBUTORS.md
        echo "Thanks to everyone who has helped with CatiaMenuWin32:" >> CONTRIBUTORS.md
        echo "" >> CONTRIBUTORS.md
        git shortlog -sn --all | cut -f2- | sed 's/^/* /' >> CONTRIBUTORS.md
        echo "CONTRIBUTORS.md updated from Git history."

    - name: Extract version from tag
      if: startsWith(github.ref, 'refs/tags/v')
      shell: bash
      run: |
        TAG=${{ github.ref_name }}
        VERSION=$(echo "$TAG" | sed 's/^v//' | cut -d. -f1-3)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Extracted version: $VERSION from tag: $TAG"

    - name: Configure and Build (tagged release)
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_C_COMPILER=clang-cl `
          -DVERSION_OVERRIDE="${{ env.VERSION }}"
        cmake --build build

    - name: Configure and Build (branch/PR)
      if: "!startsWith(github.ref, 'refs/tags/v')"
      run: |
        cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_C_COMPILER=clang-cl
        cmake --build build

    - name: Sign binary
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        $exePath = "${{ github.workspace }}\build\CatiaMenuWin32.exe"
        if (-not (Test-Path $exePath)) {
          Write-Error "Binary not found at $exePath"
          Get-ChildItem "${{ github.workspace }}\build" -Recurse | Select-Object FullName
          exit 1
        }

        # Decode and import certificate into the machine store
        $certBytes = [Convert]::FromBase64String("${{ secrets.CERTIFICATE }}")
        $certPath  = "$env:TEMP\cert.pfx"
        [IO.File]::WriteAllBytes($certPath, $certBytes)
        $pwd = ConvertTo-SecureString "${{ secrets.PASSWORD }}" -AsPlainText -Force
        Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\LocalMachine\My -Password $pwd | Out-Null
        Remove-Item $certPath -Force

        # Find the newest x64 signtool
        $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
                    Where-Object { $_.FullName -match "x64" } |
                    Sort-Object FullName -Descending |
                    Select-Object -First 1 -ExpandProperty FullName
        Write-Host "signtool: $signtool"

        & $signtool sign /sm `
            /tr http://timestamp.digicert.com /td SHA256 /fd SHA256 `
            /sha1 "${{ secrets.CERTHASH }}" `
            /n   "${{ secrets.CERTNAME }}" `
            $exePath
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Read build number and commit
      if: startsWith(github.ref, 'refs/tags/v')
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # CMake already incremented build_number.txt during configure above
        # Read the incremented value BEFORE git checkout resets it
        BUILD_NUM=$(cat build_number.txt)
        echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
        echo "Build number: $BUILD_NUM"

        git fetch origin main
        git checkout -B main origin/main

        # Restore the incremented value that git checkout just overwrote
        echo "$BUILD_NUM" > build_number.txt

        git add build_number.txt CONTRIBUTORS.md

    - name: Commit & Push build number and contributors
      if: startsWith(github.ref, 'refs/tags/v')
      uses: iarekylew00t/verified-bot-commit@v2
      with:
        branch: main
        message: "chore: increment build number for release ${{ github.ref_name }} [skip ci]"
        files: |
          build_number.txt
          CONTRIBUTORS.md

    - name: Push New Tag with build number
      if: startsWith(github.ref, 'refs/tags/v')
      shell: bash
      run: |
        BASE_TAG=${{ github.ref_name }}
        BUILD_NUM=${{ env.BUILD_NUM }}

        FULL_VERSION="${BASE_TAG}.${BUILD_NUM}"
        echo "Creating release for $FULL_VERSION"
        echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV

        # Remove the base tag from remote
        git push --delete origin "$BASE_TAG" 2>/dev/null || true

        # Create a lightweight tag on the verified bot commit â€” lightweight tags
        # inherit the commit's Verified status on GitHub
        git fetch origin main
        git tag "$FULL_VERSION" origin/main
        git push origin "$FULL_VERSION"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Release New Binary
      if: startsWith(github.ref, 'refs/tags/v')
      shell: bash
      run: |
        gh release create "$FULL_VERSION" build/CatiaMenuWin32.exe \
          README.md \
          CONTRIBUTORS.md \
          LICENSE.txt \
          --title "CATIA Macro Menu $FULL_VERSION" \
          --generate-notes \
          --target main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        FULL_VERSION: ${{ env.FULL_VERSION }}
